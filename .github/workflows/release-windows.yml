name: Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui -> target
          cache-on-failure: true

      - name: Cache Trunk and Tauri CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: tauri-tools-${{ runner.os }}-v1

      - name: Install Trunk and Tauri CLI
        shell: pwsh
        run: |
          if (-not (Get-Command trunk -ErrorAction SilentlyContinue)) {
            cargo install trunk --locked
          }
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2" --locked
          }

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: src-tauri
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: wisp-science ${{ github.ref_name }}
          releaseBodyPath: .github/release-notes/${{ github.ref_name }}.md
          releaseDraft: false
          prerelease: true
          includeUpdaterArtifacts: true
          args: --bundles msi,nsis
